{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Reservation System{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body>
    <header class="site-header">
        <nav class="navbar">
            <a href="{% url 'frontend:home' %}" class="logo">
                Reservation System
            </a>

            <div class="nav-links">
                <a href="{% url 'frontend:home' %}">Home</a>
                <a href="{% url 'frontend:rooms-list' %}">Rooms</a>
                <a href="{% url 'frontend:bookings-list' %}">My bookings</a>
                <a href="{% url 'frontend:booking-create' %}">Create booking</a>
                <a href="/api/docs/">API Docs</a>
            </div>
        </nav>
    </header>

       <main class="container">
        {% if messages %}
            <div class="messages">
                {% for message in messages %}
                    <div class="message message-{{ message.tags }}">
                        {{ message }}
                    </div>
                {% endfor %}
            </div>
        {% endif %}

        {% block content %}
        {% endblock %}
    </main>
</body>
</html>
